<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNO Multiplayer — Play with Friends</title>
  <meta name="description" content="Play UNO with friends on your mobile devices. Create or join a room and play together in person!">
  <meta name="theme-color" content="#0a0b10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-animated"></div>

  <div class="landing-container" id="landing">
    <h1 class="logo">UNO</h1>
    <p class="logo-subtitle">Multiplayer • Play on your devices</p>

    <div class="landing-card glass-elevated">
      <!-- Name Input (shared) -->
      <div class="form-group">
        <label for="playerName">Your Name</label>
        <input type="text" id="playerName" class="input" placeholder="Enter your name" maxlength="16" autocomplete="off">
      </div>

      <!-- Role Toggle -->
      <div class="form-group">
        <label>Join as</label>
        <div class="role-toggle" id="roleToggle">
          <button class="role-toggle-btn active" data-role="player" id="rolePlayer">📱 Player</button>
          <button class="role-toggle-btn" data-role="console" id="roleConsole">🖥️ Console</button>
        </div>
      </div>

      <div class="divider">choose an action</div>

      <!-- Create Room -->
      <div class="landing-section">
        <button class="btn btn-primary btn-block btn-lg" id="btnCreate">
          ✦ Create Room
        </button>
      </div>

      <!-- Join Room -->
      <div class="landing-section">
        <div class="section-label">or join existing</div>
        <div class="form-group">
          <input type="text" id="roomCode" class="input input-code" placeholder="CODE" maxlength="4" autocomplete="off">
        </div>
        <button class="btn btn-blue btn-block" id="btnJoin">
          Join Room →
        </button>
      </div>
    </div>

    <p class="text-muted mt-4" style="font-size: 0.8rem; max-width: 340px; text-align: center;">
      Create a room on one device, share the code with friends, and play UNO together!
    </p>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
</body>
</html>
